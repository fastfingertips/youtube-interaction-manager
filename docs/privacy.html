<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - YouTube Interaction Manager</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #111111;
            --text-secondary: #555555;
            --accent-color: #000000;
            --border-color: #e0e0e0;
            --code-bg: #f1f1f1;
            --table-header-bg: #f1f1f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            line-height: 1.75;
            color: var(--text-color);
            background: var(--bg-color);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 36px 24px;
        }

        .page-wrapper {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #content picture {
            display: none;
        }

        #content h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
        }

        #content h2 {
            color: var(--text-color);
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        #content h3 {
            color: var(--text-secondary);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
        }

        #content p,
        #content li,
        #content td {
            color: var(--text-color);
            margin-bottom: 16px;
            font-size: 13.5px;
            line-height: 1.75;
        }

        #content li {
            margin-bottom: 8px;
        }

        #content ul,
        #content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        #content th,
        #content td {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        #content th {
            background: var(--table-header-bg);
            color: var(--text-color);
        }

        #content a {
            color: var(--text-color);
            text-decoration: underline;
        }

        #content a:hover {
            color: var(--text-secondary);
        }

        #content code {
            background: var(--code-bg);
            color: var(--text-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        #content strong {
            color: var(--text-color);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .breadcrumb {
            margin-bottom: 20px;
            font-size: 12px;
        }

        .breadcrumb a {
            color: var(--text-color);
            text-decoration: underline;
        }

        .breadcrumb a:hover {
            color: var(--text-secondary);
        }

        .breadcrumb span {
            color: var(--text-secondary);
        }

        footer {
            margin-top: 36px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
        }

        footer a {
            color: var(--text-color);
            text-decoration: underline;
        }

        footer a:hover {
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
    <header>
        <h1>YouTube Interaction Manager</h1>
        <p class="tagline">Smart interaction manager for YouTube. Auto-like, auto-dislike, and more.</p>
    </header>

    <nav class="breadcrumb">
        <a href="./index.html">Home</a> <span>/</span> Privacy Policy
    </nav>

    <div id="content">
        <p class="loading">Loading privacy policy...</p>
    </div>

    <footer>
        <p>
            <a href="https://github.com/fastfingertips/youtube-interaction-manager">GitHub</a> · 
            <a href="./guide.html">Guide</a> · 
            <a href="./privacy.html">Privacy Policy</a> · 
            <a href="https://github.com/fastfingertips/youtube-interaction-manager/issues">Report Issues</a> · 
            <a href="https://github.com/fastfingertips/youtube-interaction-manager/blob/main/LICENSE">MIT License</a>
        </p>
        <p style="margin-top: 10px; opacity: 0.8; font-size: 11px;">
            Made by <a href="https://github.com/fastfingertips">fastfingertips</a> · <a href="https://bugra.co">bugra.co</a>
        </p>
    </footer>
    </div>

    <script>
        async function loadPrivacyPolicy() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/fastfingertips/youtube-interaction-manager/main/PRIVACY.md');

                if (response.ok) {
                    const markdown = await response.text();
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                } else {
                    throw new Error('Could not load privacy policy');
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <h1>Privacy Policy</h1>
                    <p>Unable to load privacy policy. Please visit our 
                    <a href="https://github.com/fastfingertips/youtube-interaction-manager/blob/main/PRIVACY.md">GitHub repository</a> 
                    to view it.</p>
                `;
            }
        }

        loadPrivacyPolicy();
    </script>
</body>

</html>
