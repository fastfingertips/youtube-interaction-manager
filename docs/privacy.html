<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - YouTube Interaction Manager</title>
    <meta name="description" content="Privacy policy for YouTube Interaction Manager. Learn what data is stored locally, which permissions are used, and how the extension handles your information.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ytmanager.bugra.co/privacy.html">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="YouTube Interaction Manager">
    <meta property="og:title" content="Privacy Policy - YouTube Interaction Manager">
    <meta property="og:description" content="YouTube Interaction Manager stores settings locally and does not collect personal data.">
    <meta property="og:url" content="https://ytmanager.bugra.co/privacy.html">
    <meta property="og:image" content="https://ytmanager.bugra.co/store/promo_marquee_light.png">
    <meta property="og:image:alt" content="YouTube Interaction Manager privacy policy preview">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Privacy Policy - YouTube Interaction Manager">
    <meta name="twitter:description" content="Privacy and permissions details for YouTube Interaction Manager.">
    <meta name="twitter:image" content="https://ytmanager.bugra.co/store/promo_marquee_light.png">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./site.css">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "Privacy Policy - YouTube Interaction Manager",
            "description": "Privacy policy and permissions details for YouTube Interaction Manager.",
            "url": "https://ytmanager.bugra.co/privacy.html",
            "isPartOf": {
                "@type": "WebSite",
                "name": "YouTube Interaction Manager",
                "url": "https://ytmanager.bugra.co/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #111111;
            --text-secondary: #555555;
            --accent-color: #000000;
            --border-color: #e0e0e0;
            --code-bg: #f1f1f1;
            --table-header-bg: #f1f1f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            line-height: 1.75;
            color: var(--text-color);
            background: var(--site-noise), var(--bg-color);
            font-size: 14px;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
        }

        #content picture {
            display: none;
        }

        #content h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
        }

        #content h2 {
            color: var(--text-color);
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        #content h3 {
            color: var(--text-secondary);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
        }

        #content p,
        #content li,
        #content td {
            color: var(--text-color);
            margin-bottom: 16px;
            font-size: 13.5px;
            line-height: 1.75;
        }

        #content li {
            margin-bottom: 8px;
        }

        #content ul,
        #content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        #content th,
        #content td {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        #content th {
            background: var(--table-header-bg);
            color: var(--text-color);
        }

        #content a {
            color: var(--text-color);
            text-decoration: underline;
        }

        #content a:hover {
            color: var(--text-secondary);
        }

        #content code {
            background: var(--code-bg);
            color: var(--text-color);
            padding: 2px 6px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        #content strong {
            color: var(--text-color);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .breadcrumb {
            margin-bottom: 20px;
            font-size: 12px;
        }

        .breadcrumb a {
            color: var(--text-color);
            text-decoration: underline;
        }

        .breadcrumb a:hover {
            color: var(--text-secondary);
        }

        .breadcrumb span {
            color: var(--text-secondary);
        }

    </style>
    <script src="./site.js" defer></script>
</head>

<body class="site-page">
    <div class="page-wrapper site-page-wrapper">
    <div data-site-header></div>

    <nav class="breadcrumb">
        <a href="./index.html">Home</a> <span>/</span> Privacy Policy
    </nav>

    <main class="site-content-wide">
    <div id="content">
        <p class="loading">Loading privacy policy...</p>
    </div>

    </main>
    <div data-site-footer></div>
    </div>

    <script>
        async function loadPrivacyPolicy() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/fastfingertips/youtube-interaction-manager/main/PRIVACY.md');

                if (response.ok) {
                    const markdown = await response.text();
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                } else {
                    throw new Error('Could not load privacy policy');
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <h1>Privacy Policy</h1>
                    <p>Unable to load privacy policy. Please visit our 
                    <a href="https://github.com/fastfingertips/youtube-interaction-manager/blob/main/PRIVACY.md">GitHub repository</a> 
                    to view it.</p>
                `;
            }
        }

        loadPrivacyPolicy();
    </script>
</body>

</html>
