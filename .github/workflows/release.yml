name: Build, Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Build Script
        run: python tools/build_release.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload & Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5
        with:
          # Uses the tag name (e.g., v1.3.26) for the zip filename
          file-path: releases/youtube-interaction-manager-${{ github.ref_name }}-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
